openapi: 3.0.0
info:
  title: API Fédération
  version: 1.0.0

paths:
  /federation/direction:
    get:
      summary: Voir les membres du bureau national
      responses:
        '200':
          description: Liste des dirigeants
    put:
      summary: Changer un membre du bureau
      responses:
        '200':
          description: Bureau mis à jour
  /federation/statistiques/rapport-global:
    get:
      summary: Rapport Global Mensuel/Annuel (H)
      description: Recensement des données issues de toutes les collectivités.
      parameters:
        - name: periode_debut
          in: query
          required: true
          schema: { type: string, format: date }
        - name: periode_fin
          in: query
          required: true
          schema: { type: string, format: date }
      responses:
        '200':
          description: Statistiques comparatives
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RapportCollectivite'

components:
  schemas:
    RapportCollectivite:
      type: object
      properties:
        collectivite_id: { type: integer }
        nom_collectivite: { type: string }
        taux_assiduite_global: { type: number, format: float }
        pourcentage_membres_a_jour: { type: number, format: float }
        nombre_nouveaux_adherents: { type: integer }