openapi: 3.0.0
info:
  title: API Membres
  version: 1.1.0
  description: Gestion des membres et processus d'admission avec min 2 parrains.

paths:
  /membres:
    get:
      summary: Liste filtrable des membres
      parameters:
        - name: statut
          in: query
          schema: { type: string, enum: [CONFIRME, JUNIOR] }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Membre'
  /membres/admission:
    post:
      summary: Admission d'un nouveau membre (B-2)
      description: Nécessite 2 parrains confirmés et le paiement intégral (50k + cotisation annuelle).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DemandeAdmission'
      responses:
        '201':
          description: Admis avec succès
        '403':
          description: Parrainage insuffisant
  /membres/{id}:
    get:
      summary: Détails complets d'un membre
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membre'
    put:
      summary: Mise à jour du profil ou du poste
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MembreUpdate'
      responses:
        '200':
          description: Profil mis à jour
    delete:
      summary: Sortie d'un membre (Désactivation)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '204':
          description: Membre désactivé

components:
  schemas:
    DemandeAdmission:
      type: object
      required: [nom, prenoms, telephone, parrains, paiement_initial]
      properties:
        nom: { type: string }
        prenoms: { type: string }
        telephone: { type: string }
        collectivite_id: { type: integer }
        parrains:
          type: array
          minItems: 2
          items:
            type: object
            required: [parrain_id, nature_relation]
            properties:
              parrain_id: { type: integer }
              nature_relation: { type: string, enum: [famille, amis, collègues, autre] }
        paiement_initial:
          type: object
          properties:
            montant_total: { type: number, description: "50.000 + Cotisation Annuelle" }
            mode: { type: string, enum: [ESPECES, MOBILE_MONEY, VIREMENT] }
    Membre:
      type: object
      properties:
        id: { type: integer }
        nom: { type: string }
        prenoms: { type: string }
        statut: { type: string, enum: [CONFIRME, JUNIOR] }
        date_adhesion: { type: string, format: date }
        est_actif: { type: boolean }
    MembreUpdate:
      type: object
      properties:
        adresse: { type: string }
        metier: { type: string }
        poste: { type: string, enum: [PRESIDENT, TRESORIER, SECRETAIRE, MEMBRE] }