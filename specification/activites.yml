openapi: 3.0.0
info:
  title: API Activités
  version: 1.0.0

paths:
  /activites:
    get:
      summary: Lister les activités (Réunions, AG, Formations)
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Activite'
    post:
      summary: Créer une activité
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActiviteCreation'
      responses:
        '201':
          description: Créée
  /activites/{id}/presences:
    get:
      summary: Liste de présence pour une activité
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Presence'
    post:
      summary: Enregistrer des présences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/PresenceRecord'
      responses:
        '200':
          description: Pointage effectué

components:
  schemas:
    ActiviteCreation:
      type: object
      required: [nom, date, type, entite_id]
      properties:
        nom: { type: string }
        date: { type: string, format: date-time }
        type: { type: string, enum: [AG_MENSUELLE, FORMATION, EXCEPTIONNELLE] }
        entite_id: { type: integer }
        obligatoire: { type: boolean, default: true }
    Activite:
      allOf:
        - $ref: '#/components/schemas/ActiviteCreation'
        - type: object
          properties:
            id: { type: integer }
    PresenceRecord:
      type: object
      required: [membre_id, statut]
      properties:
        membre_id: { type: integer }
        statut: { type: string, enum: [PRESENT, ABSENT, EXCUSE] }
        motif: { type: string }
    Presence:
      allOf:
        - $ref: '#/components/schemas/PresenceRecord'
        - type: object
          properties:
            id: { type: integer }
            activite_id: { type: integer }