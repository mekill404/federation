openapi: 3.0.0
info:
  title: API Paiements
  version: 1.0.0

paths:
  /paiements:
    post:
      summary: Enregistrer une cotisation (Mensuelle/Annuelle)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Paiement'
      responses:
        '201':
          description: Paiement validé
    get:
      summary: Historique des paiements
      parameters:
        - name: membre_id
          in: query
          schema: { type: integer }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Paiement'

components:
  schemas:
    Paiement:
      type: object
      required: [membre_id, montant, type_cotisation, compte_id]
      properties:
        id: { type: integer }
        membre_id: { type: integer }
        montant: { type: number }
        date_paiement: { type: string, format: date-time }
        type_cotisation: { type: string, enum: [ADHESION, ANNUELLE, MENSUELLE, PONCTUELLE] }
        compte_id: { type: integer }