openapi: 3.0.0
info:
  title: API Collectivités Agricoles
  version: 1.0.0
  description: Gestion complète du cycle de vie des collectivités.

paths:
  /collectivites:
    get:
      summary: Lister toutes les collectivités
      responses:
        '200':
          description: Liste récupérée
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Collectivite'
    post:
      summary: Créer une nouvelle collectivité
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectiviteCreation'
      responses:
        '201':
          description: Créée
  /collectivites/{id}:
    get:
      summary: Détails d'une collectivité
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivite'
    put:
      summary: Modifier une collectivité
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectiviteUpdate'
      responses:
        '200':
          description: Mise à jour réussie
    delete:
      summary: Supprimer (Archiver) une collectivité
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '204':
          description: Supprimé
  /collectivites/{id}/statistiques:
    get:
      summary: Statistiques locales d'une collectivité
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: debut
          in: query
          schema: { type: string, format: date }
      responses:
        '200':
          description: Chiffres clés (Assiduité, Cotisations)

components:
  schemas:
    CollectiviteCreation:
      type: object
      required: [numero_unique, nom_unique, specialite, ville_id]
      properties:
        numero_unique: { type: string, example: "COLL-001" }
        nom_unique: { type: string }
        specialite: { type: string }
        ville_id: { type: integer }
    Collectivite:
      allOf:
        - $ref: '#/components/schemas/CollectiviteCreation'
        - type: object
          properties:
            id: { type: integer }
            date_creation: { type: string, format: date }
    CollectiviteUpdate:
      type: object
      properties:
        nom_unique: { type: string }
        specialite: { type: string }