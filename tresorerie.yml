openapi: 3.0.0
info:
  title: API Trésorerie
  version: 1.0.0
  description: Gestion des comptes bancaires (RIB 23 chiffres), Mobile Money et Caisses.

paths:
  /comptes:
    get:
      summary: Liste des comptes de l'entité
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Compte'
    post:
      summary: Créer un compte (Bancaire, Mobile ou Caisse)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompteCreation'
      responses:
        '201':
          description: Compte créé
  /comptes/{id}:
    get:
      summary: Détails du compte
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Compte'
    put:
      summary: Ajuster le solde ou le titulaire
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompteUpdate'
      responses:
        '200':
          description: Mis à jour
    delete:
      summary: Clôturer un compte
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '204':
          description: Clôturé

components:
  schemas:
    CompteCreation:
      type: object
      required: [type, titulaire, entite_id, entite_type]
      properties:
        type: { type: string, enum: [caisse, bancaire, mobile_money] }
        titulaire: { type: string }
        entite_id: { type: integer }
        entite_type: { type: string, enum: [COLLECTIVITE, FEDERATION] }
        banque_nom: { type: string, enum: [BRED, MCB, BMOI, BOA, BGFI, AFG, SIPEM] }
        code_banque: { type: string, pattern: '^\d{5}$' }
        code_guichet: { type: string, pattern: '^\d{5}$' }
        numero_compte: { type: string, pattern: '^\d{11}$' }
        cle_rib: { type: string, pattern: '^\d{2}$' }
        operateur: { type: string, enum: [MVOLA, ORANGE, AIRTEL] }
        numero_tel: { type: string }
    Compte:
      allOf:
        - $ref: '#/components/schemas/CompteCreation'
        - type: object
          properties:
            id: { type: integer }
            solde: { type: number }
    CompteUpdate:
      type: object
      properties:
        titulaire: { type: string }
        solde: { type: number }